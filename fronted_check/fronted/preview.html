<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background: #111;
            color: white;
            font-family: sans-serif;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 40px;
            padding: 20px;
        }

        .card {
            border: 2px solid #333;
            padding: 20px;
            text-align: center;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        h1 {
            margin-top: 0;
            text-align: center;
            font-size: 3em;
        }

        h2 {
            font-size: 2em;
            color: #ff00ff;
        }
    </style>
</head>

<body>
    <h1>Screenshots Preview</h1>
    <div class="grid">
        <div class="card">
            <h2>stitch (0)</h2><img src="preview/0.png">
        </div>
        <div class="card">
            <h2>stitch (1)</h2><img src="preview/1.png">
        </div>
        <div class="card">
            <h2>stitch (2)</h2><img src="preview/2.png">
        </div>
        <div class="card">
            <h2>stitch (3)</h2><img src="preview/3.png">
        </div>
        <div class="card">
            <h2>stitch (4)</h2><img src="preview/4.png">
        </div>
        <div class="card">
            <h2>stitch (5)</h2><img src="preview/5.png">
        </div>
        <div class="card">
            <h2>stitch (6)</h2><img src="preview/6.png">
        </div>
        <div class="card">

        </div>
    </div>
</body>

</html>
